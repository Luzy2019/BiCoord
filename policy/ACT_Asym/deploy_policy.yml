# Basic experiment configuration
task_name: null
policy_name: ACT
task_config: null
ckpt_setting: null
seed: 0
instruction_type: unseen

# ACT-specific arguments
action_dim: 14
kl_weight: 10.0
chunk_size: 50 
hidden_dim: 512
dim_feedforward: 3200
temporal_agg: false 
device: cuda:0

# Optional asymmetric bimanual execution.
# Inference still outputs [B, H, 14]; masks/hold make right arm lower-frequency.
use_asym_residual: false
left_action_dim: 7
right_action_dim: 7
left_action_start: 0
right_action_start: 7
left_stride: 1
right_stride: 5
asym_hidden_dim: 256
asym_residual_scale: 0.1
asym_projector_mode: hold
asym_strict_execution: true
asym_use_qpos_condition: true
asym_schedule_mode: learned
asym_target_mode: original
asym_stride_choices: ""
asym_hard_inference: true
asym_update_threshold: 0.5
asym_num_roles: 4
asym_role_emb_dim: 16
asym_use_role_condition: true
asym_lambda_res: 0.0001
asym_lambda_gate: 0.0001
asym_lambda_smooth: 0.001
asym_lambda_freq: 0.01
asym_lambda_update_kl: 0.01
asym_lambda_update_sparse: 0.001
asym_lambda_role: 0.01

# DETR parser args
ckpt_dir: null
policy_class: ACT
num_epochs: 2000

# Model training params
position_embedding: sine
lr_backbone: 0.00001
weight_decay: 0.0001
lr: 0.00001
masks: false
dilation: false
backbone: resnet18
nheads: 8
enc_layers: 4
dec_layers: 7
pre_norm: false
dropout: 0.1
camera_names:
  - cam_high
  - cam_right_wrist
  - cam_left_wrist
